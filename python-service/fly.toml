app = "hkex-monitor-service"
primary_region = "sin"   # Singapore — closest to HK

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false   # keep alive for continuous polling
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  PORT = "8080"
